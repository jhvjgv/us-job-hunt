# 双子域名：两个独立 server{}，避免同一 server_name 在多处重复导致 “conflicting server name … ignored”。
# 两个块共用同一 root（同一套前端 dist），仅 server_name 不同。
#
# 部署示例（Ubuntu）：
#   sudo cp deploy/nginx/athenaprogramming-dual-server.conf /etc/nginx/sites-available/athenaprogramming
#   sudo ln -sf /etc/nginx/sites-available/athenaprogramming /etc/nginx/sites-enabled/athenaprogramming
# 删除 / 注释 sites-enabled 里其它仍声明 member.* 或 job.* 的旧配置，保证每个域名只出现在一个 server 块里。
#   sudo nginx -t && sudo systemctl reload nginx
#
# 若 root 目录不是 /var/www/us-job-hunt，请两处一并修改。
# HTTPS：可在各自 server 内增加 listen 443 ssl 与证书路径（或改用 certbot 生成的独立文件）。

server {
    listen 80;
    listen [::]:80;
    server_name member.athenaprogramming.com;

    root /var/www/us-job-hunt;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name job.athenaprogramming.com;

    root /var/www/us-job-hunt;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
