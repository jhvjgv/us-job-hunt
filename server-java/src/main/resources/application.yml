spring:
  application:
    name: us-job-hunt-backend
  
  datasource:
    # Supabase：Dashboard → Connect → Connection string → JDBC（需 sslmode=require）
    # 例：jdbc:postgresql://db.xxxxx.supabase.co:5432/postgres?sslmode=require
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api

# 前端公网地址（支付宝同步跳转回你的站点）
# 后端公网根地址（不含 /api 路径；用于拼接支付宝异步通知 URL，须 HTTPS 可公网访问）
app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  backend-public-url: ${BACKEND_PUBLIC_URL:http://localhost:8080}

logging:
  level:
    root: INFO
    com.usjobhunt: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-environment}
  expiration: 86400000  # 24 hours in milliseconds

# Alipay Configuration
alipay:
  app-id: ${ALIPAY_APP_ID:}
  merchant-private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  encrypt-key: ${ALIPAY_ENCRYPT_KEY:}
  gateway-url: https://openapi.alipay.com/gateway.do

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  allow-credentials: true
  max-age: 3600
